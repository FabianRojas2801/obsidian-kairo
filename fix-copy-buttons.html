<style>
	.code-block-wrapper {
		position: relative;
	}

	.code-block-wrapper button.copy-code-button {
		position: absolute;
		top: 8px;
		right: 8px;
		z-index: 10;
	}

	.code-block-wrapper button.copy-code-button svg {
		width: 16px;
		height: 16px;
	}

	pre code {
		white-space: pre !important;
	}

	pre {
		overflow-x: auto;
	}
</style>

<script>
	(function () {
		// https://lucide.dev/icons/copy
		const ICON_COPY = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="8" width="14" height="14" rx="2" ry="2"></rect><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path></svg>`;

		// https://lucide.dev/icons/check
		const ICON_CHECK = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;

		document.querySelectorAll('pre').forEach(pre => {
			const button = pre.querySelector('button.copy-code-button');
			if (!button) return;

			// Wrap <pre> in a relative div and move button outside it
			const wrapper = document.createElement('div');
			wrapper.className = 'code-block-wrapper';
			pre.parentNode.insertBefore(wrapper, pre);
			wrapper.appendChild(pre);
			wrapper.appendChild(button);

			button.addEventListener('click', () => {
				const code = pre.querySelector('code');
				if (!code) return;
				navigator.clipboard.writeText(code.innerText).then(() => {
					button.innerHTML = ICON_CHECK;
					button.style.opacity = '1';
					setTimeout(() => {
						button.innerHTML = ICON_COPY;
						button.style.opacity = '';
					}, 2000);
				}).catch(err => console.error('Copy failed:', err));
			});
		});
	})();
</script>
