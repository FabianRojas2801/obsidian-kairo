<script>
	(function () {
		// https://lucide.dev/icons/copy
		const ICON_COPY = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="svg-icon lucide lucide-copy-icon lucide-copy"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>`;

		// https://lucide.dev/icons/check
		const ICON_CHECK = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="svg-icon lucide lucide-check-icon lucide-check"><path d="M20 6 9 17l-5-5"/></svg>`;

		document.querySelectorAll('button.copy-code-button').forEach(button => {
			button.addEventListener('click', () => {
				const code = button.previousElementSibling;
				if (!code) return;
				
				navigator.clipboard.writeText(code.innerText).then(() => {
					button.innerHTML = ICON_CHECK;
					button.style.opacity = '1';
					setTimeout(() => {
						button.innerHTML = ICON_COPY;
						button.style.opacity = '';
					}, 2000);
				}).catch(err => console.error('Copy failed:', err));
			});
		});
	})();
</script>
